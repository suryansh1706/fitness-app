<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
  </head>
  <body>
    <h2>Basic Details</h2>
    <form>
      <input type="text" id="age" placeholder="Age" required />
      <br>
      <input type="text" id="gender" placeholder="Gender" required />
      <br>
      <input type="text" id="height" placeholder="Height (cm)" required />
      <br>
      <input type="text" id="weight" placeholder="Weight (kg)" required />
      <br>
      <select name="activityLevel" id="activityLevel">
        <option value="" disabled selected hidden>Choose your activity level</option>
        <option value="sedentary">Sedentary</option>
        <option value="lightly active">Lightly Active</option>
        <option value="moderately active">Moderately Active</option>
        <option value="very active">Very Active</option>
        <option value="extra active">Extra Active</option>
      </select>
      <br>      

      <select name="goal" id="goal">
        <option value="" disabled selected hidden>Choose your goal</option>
        <option value="loseweight">Lose weight</option>
        <option value="maintainweight">Maintain weight</option>
        <option value="gainweight">Gain weight</option>
      </select>

        <button type="submit" id="save-profile">Save Profile</button>
    </form>

    <div id="maintenance-calories"></div>

    <script type="module" src="../src/main.js"></script>
  </body>
</html>
